{% extends "base.html" %}
{% block title %}订单管理 — RiiChain{% endblock %}
{% block extra_css %}
<style>
  .kpi-card { border:none; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); cursor:pointer; transition:all 0.2s; }
  .kpi-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.12); }
  .kpi-card.active { border:2px solid var(--primary); }
  .kpi-val { font-size:28px; font-weight:800; }
  .kpi-lbl { font-size:12px; color:#64748b; }
  .status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .st-pending{background:#fef3c7;color:#92400e} .st-printed{background:#dbeafe;color:#1d4ed8}
  .st-picked{background:#e0e7ff;color:#3730a3} .st-reviewed{background:#dcfce7;color:#166534}
  .st-shipped{background:#cffafe;color:#155e75} .st-cancelled{background:#fee2e2;color:#991b1b}
  .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .filter-bar input,.filter-bar select { padding:6px 12px; border:1px solid #e2e8f0; border-radius:6px; font-size:13px; }
  .page-btn { padding:4px 10px; border:1px solid #e2e8f0; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; }
  .page-btn:hover { background:#f1f5f9; }
  .page-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold mb-0"><i class="bi bi-cart me-2" style="color:var(--primary);"></i>订单管理</h4>
  <div class="d-flex gap-2">
    <input type="file" id="excel-upload" accept=".xlsx,.xls" style="display:none;" onchange="uploadExcel(this)">
    <button class="btn btn-sm btn-outline-danger" onclick="document.getElementById('excel-upload').click()">📥 导入Excel</button>
    <span id="upload-status" class="small text-muted"></span>
  </div>
</div>

<!-- KPI Cards -->
<div class="row g-2 mb-3" id="kpi-cards">
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('')"><div class="kpi-val" id="kpi-total">-</div><div class="kpi-lbl">总单量</div></div></div>
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('pending')"><div class="kpi-val" id="kpi-pending">-</div><div class="kpi-lbl">待处理</div></div></div>
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('printed')"><div class="kpi-val" id="kpi-printed">-</div><div class="kpi-lbl">已打印</div></div></div>
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('picked')"><div class="kpi-val" id="kpi-picked">-</div><div class="kpi-lbl">已拣货</div></div></div>
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('reviewed')"><div class="kpi-val" id="kpi-reviewed">-</div><div class="kpi-lbl">已复核</div></div></div>
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('shipped')"><div class="kpi-val" id="kpi-shipped">-</div><div class="kpi-lbl">已出库</div></div></div>
  <div class="col"><div class="kpi-card card p-2 text-center" onclick="filterByStatus('cancelled')"><div class="kpi-val" id="kpi-cancelled">-</div><div class="kpi-lbl">已取消</div></div></div>
</div>

<!-- Filter Bar -->
<div class="card mb-3 border-0 shadow-sm"><div class="card-body py-2">
  <div class="filter-bar">
    <span class="fw-semibold small">📅 创建时间</span>
    <input type="date" id="f-date-from" style="width:140px;" title="开始日期">
    <span class="small text-muted">至</span>
    <input type="date" id="f-date-to" style="width:140px;" title="结束日期">
    <span class="fw-semibold small ms-3">📋 状态</span>
    <select id="f-status" style="width:120px;">
      <option value="">全部</option>
      <option value="pending">待处理</option><option value="printed">已打印</option>
      <option value="picked">已拣货</option><option value="reviewed">已复核</option>
      <option value="shipped">已出库</option><option value="cancelled">已取消</option>
    </select>
    <select id="f-ym" class="form-select-sm" style="width:auto;" onchange="loadOrders()"><option value="">全部月份</option></select>
    <button class="btn btn-sm btn-danger" onclick="loadOrders(1)">查询</button>
    <span class="small text-muted ms-auto" id="page-info"></span>
  </div>
</div></div>

<!-- Orders Table -->
<div class="card border-0 shadow-sm">
  <div class="table-responsive" style="max-height:60vh;overflow-y:auto;">
    <table class="table table-sm table-hover align-middle mb-0">
      <thead class="table-light" style="position:sticky;top:0;z-index:1;">
        <tr><th>出库单号</th><th>波次号</th><th>SKU数</th><th>总件数</th><th>产品</th><th>快递单号</th><th>状态</th><th>出库日期</th></tr>
      </thead>
      <tbody id="orders-tbody"><tr><td colspan="8" class="text-center py-4 text-muted">加载中...</td></tr></tbody>
    </table>
  </div>
  <div class="card-footer bg-white d-flex justify-content-center gap-1 py-2" id="pagination"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage=1,currentStatus='',totalPages=1;
var statusMap={pending:'待处理',printed:'已打印',picked:'已拣货',reviewed:'已复核',shipped:'已出库',cancelled:'已取消'};
var statusCls={pending:'st-pending',printed:'st-printed',picked:'st-picked',reviewed:'st-reviewed',shipped:'st-shipped',cancelled:'st-cancelled'};

async function loadKPI(){
  var r=await fetch('/api/v1/orders/delivery/kpi'); var d=(await r.json()).data||{};
  var kpi=d.kpi||{};
  document.getElementById('kpi-total').textContent=kpi.total||0;
  document.getElementById('kpi-pending').textContent=kpi.pending||0;
  document.getElementById('kpi-printed').textContent=kpi.printed||0;
  document.getElementById('kpi-picked').textContent=kpi.picked||0;
  document.getElementById('kpi-reviewed').textContent=kpi.reviewed||0;
  document.getElementById('kpi-shipped').textContent=kpi.shipped||0;
  document.getElementById('kpi-cancelled').textContent=kpi.cancelled||0;
  // Month dropdown
  var sel=document.getElementById('f-ym');
  sel.innerHTML='<option value=\"\">全部月份</option>'+(d.available_months||[]).map(function(m){return '<option value=\"'+m+'\">'+m+'</option>';}).join('');
  // Highlight active status card
  document.querySelectorAll('.kpi-card').forEach(function(c){c.classList.remove('active');});
  if(currentStatus) document.getElementById('kpi-'+currentStatus)?.parentElement?.classList.add('active');
}

function filterByStatus(st){currentStatus=st;document.getElementById('f-status').value=st;loadOrders(1);}

async function loadOrders(page){
  if(page) currentPage=page;
  var ym=document.getElementById('f-ym').value;
  var st=document.getElementById('f-status').value||currentStatus;
  var df=document.getElementById('f-date-from').value;
  var dt=document.getElementById('f-date-to').value;
  var params=new URLSearchParams({page:currentPage,page_size:30});
  if(ym) params.set('ym',ym);
  if(st) params.set('status',st);
  if(df) params.set('date_from',df);
  if(dt) params.set('date_to',dt);

  var r=await fetch('/api/v1/orders/delivery/list?'+params.toString());
  var d=await r.json(); var data=d.data||{};
  totalPages=data.pages||1;
  document.getElementById('page-info').textContent='共 '+data.total+' 条，第 '+data.page+'/'+data.pages+' 页';

  var orders=data.orders||[];
  var tbody=document.getElementById('orders-tbody');
  if(!orders.length){tbody.innerHTML='<tr><td colspan=\"8\" class=\"text-center py-4 text-muted\">无匹配数据</td></tr>';}
  else {tbody.innerHTML=orders.map(function(o){return '<tr><td><code>'+o.outbound_no+'</code></td><td><small>'+(o.wave_no||'-')+'</small></td><td>'+(o.sku_count||0)+'</td><td>'+(o.total_qty||0)+'</td><td><small style=\"max-width:200px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">'+(o.product_names||'')+'</small></td><td><small>'+(o.tracking_no||'-')+'</small></td><td><span class=\"status-badge '+(statusCls[o.custom_status]||'')+'\">'+(statusMap[o.custom_status]||o.custom_status||'?')+'</span></td><td>'+(o.order_date||'')+'</td></tr>';}).join('');}

  // Pagination
  var pg=document.getElementById('pagination');
  var h='';
  if(currentPage>1) h+='<button class=\"page-btn\" onclick=\"loadOrders('+(currentPage-1)+')\">上一页</button>';
  for(var i=Math.max(1,currentPage-3);i<=Math.min(totalPages,currentPage+3);i++) h+='<button class=\"page-btn'+(i===currentPage?' active':'')+'\" onclick=\"loadOrders('+i+')\">'+i+'</button>';
  if(currentPage<totalPages) h+='<button class=\"page-btn\" onclick=\"loadOrders('+(currentPage+1)+')\">下一页</button>';
  pg.innerHTML=h;
}

loadKPI();loadOrders();

async function uploadExcel(input){
  var f=input.files[0];if(!f)return;
  var st=document.getElementById('upload-status');st.textContent='⏳ 导入中...';
  var fd=new FormData();fd.append('file',f);
  try{
    var r=await fetch('/api/v1/orders/delivery/upload-excel',{method:'POST',body:fd});
    var d=await r.json();
    if(d.code===0){st.textContent='✅ '+d.data.msg;}
    else{st.textContent='❌ '+d.msg;}
    loadKPI();loadOrders();
  }catch(e){st.textContent='❌ '+e.message;}
  input.value='';
}
</script>
{% endblock %}
