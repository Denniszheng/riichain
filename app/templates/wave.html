{% extends "base.html" %}
{% block title %}波次与履约 — RiiChain{% endblock %}

{% block extra_css %}
<style>
  .wave-status { font-size:0.78rem; padding:3px 10px; border-radius:20px; font-weight:600; }
  .sku-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .sku-badge.Accessories { background:#fef3c7; color:#b45309; }
  .sku-badge.Standard { background:#dbeafe; color:#1d4ed8; }
  .sku-badge.Customization { background:#f3e8ff; color:#7c3aed; }
  .order-no { font-family:monospace; font-weight:700; color:var(--primary); font-size:15px; }
  .copy-icon { cursor:pointer; opacity:0; font-size:14px; transition:opacity 0.15s; }
  .order-no:hover .copy-icon { opacity:1; }
  .search-bar { background:linear-gradient(135deg,#f8fafc,#fff); border:2px solid #e2e8f0; border-radius:12px; padding:20px 24px; }
  .wave-input { font-family:monospace; font-size:16px; font-weight:600; padding:10px 16px; border:2px solid #e2e8f0; border-radius:8px; outline:none; width:240px; }
  .wave-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(196,30,58,0.1); }
  .sku-cell img { width:70px; height:70px; object-fit:contain; border-radius:6px; border:1px solid #e2e8f0; cursor:zoom-in; transition:all 0.2s; }
  .sku-cell img:hover { transform:scale(2.5); z-index:100; box-shadow:0 8px 24px rgba(0,0,0,0.2); position:relative; }
  .lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; cursor:pointer; }
  .lightbox.active { display:flex; }
  .lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:12px; }
  .copy-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#16a34a; color:white; padding:8px 20px; border-radius:8px; z-index:99999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .copy-toast.show { opacity:1; }
  @media print { .sidebar,.navbar,.search-bar { display:none!important; } }
</style>
{% endblock %}

{% block content %}
<div class="mb-4">
  <h4 class="fw-bold mb-1"><i class="bi bi-layer-stack me-2" style="color:var(--primary);"></i>波次与履约</h4>
  <p class="text-muted mb-0" style="font-size:0.9rem;">对接领星 WMS，查询波次订单明细、打印面单、展示产品图片</p>
</div>

<!-- Search Bar -->
<div class="search-bar mb-4">
  <div class="row g-3 align-items-end">
    <div class="col-auto">
      <label class="form-label fw-semibold small mb-1"><i class="bi bi-search"></i> 波次号 Wave No.</label>
      <input type="text" class="wave-input form-control" id="wave-input" placeholder="输入波次号..." onkeypress="if(event.key==='Enter')searchWave()">
    </div>
    <div class="col-auto">
      <button class="btn btn-danger" onclick="searchWave()">查询</button>
    </div>
    <div class="col-auto">
      <button class="btn btn-outline-secondary" onclick="toggleScanner()" id="btn-scan">📷 扫码</button>
    </div>
    <div class="col-auto">
      <button class="btn btn-outline-secondary" onclick="resetPrinted()">🔄 重置打印</button>
    </div>
    <div class="col-auto ms-auto">
      <span id="import-status" class="small text-muted"></span>
    </div>
  </div>
  <!-- Scanner area -->
  <div id="scan-area" class="mt-3" style="display:none;">
    <div id="reader" style="width:300px;"></div>
    <button class="btn btn-sm btn-outline-danger mt-2" onclick="toggleScanner()">关闭扫描</button>
  </div>
</div>

<!-- Summary Cards -->
<div class="row g-3 mb-3" id="summary-row"></div>

<!-- Results -->
<div id="content-area">
  <div class="text-center py-5 text-muted">
    <i class="bi bi-search" style="font-size:3rem;"></i>
    <p class="mt-2">输入波次号查询，或点击 📷 扫码</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img src="" id="lightbox-img">
</div>

<!-- Copy Toast -->
<div class="copy-toast" id="copy-toast"></div>

<!-- Hidden file inputs for image loading -->
<input type="file" id="image-import" accept="image/*" class="d-none" multiple onchange="loadImages(this)">
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// ── Global State ──
var allRows = [];
var waveMap = {};
var imageCache = {};
var labelCache = {};
var printedSet = {};
var currentWave = null;
var scanner = null;
try { printedSet = JSON.parse(localStorage.getItem('riichain_printed')||'{}'); } catch(e) { printedSet = {}; }
function savePrinted() { localStorage.setItem('riichain_printed', JSON.stringify(printedSet)); }

// ── Wave Search ──
async function searchWave() {
  var input = document.getElementById('wave-input').value.trim();
  if (!input) return;

  // Check local cache
  var foundKey = Object.keys(waveMap).find(function(k){ return k.toLowerCase()===input.toLowerCase(); });
  if (foundKey) { currentWave = foundKey; renderWave(foundKey); return; }

  // Fetch from WMS
  document.getElementById('import-status').textContent = '⏳ 正在从领星拉取...';
  try {
    var r = await fetch('/api/v1/orders/wms/wave-detail', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({waveNo:input})
    });
    var data = await r.json();
    if (data.code!==0) { alert(data.msg||'查询失败'); document.getElementById('import-status').textContent=''; return; }
    var details = data.data.details||[];
    if (!details.length) {
      document.getElementById('import-status').textContent='';
      document.getElementById('content-area').innerHTML='<div class="text-center py-5 text-muted"><p>WMS 未返回此波次数据</p></div>';
      return;
    }
    // Merge into allRows
    var skuTypes = {};
    for (var i=0;i<details.length;i++) {
      var d=details[i];
      var pt=d.productType||'Customization';
      if (pt==='Standard'||pt==='Accessories'||pt!=='Customization'){} // keep as-is
      allRows.push({orderNo:d.orderNo,waveNo:input,trackingNo:d.trackingNo,sku:d.sku,qty:d.qty,productType:pt,sheetUrl:d.sheetUrl||''});
      skuTypes[d.sku]=pt;
    }
    buildWaveMap();
    document.getElementById('import-status').textContent='✅ '+details.length+' 行 · '+Object.keys(waveMap).length+' Wave';
    var refound=Object.keys(waveMap).find(function(k){return k.toLowerCase()===input.toLowerCase();});
    if (refound) { currentWave=refound; renderWave(refound); }
  } catch(e) {
    document.getElementById('import-status').textContent='❌ '+e.message;
  }
}

function buildWaveMap() {
  waveMap={};
  for (var i=0;i<allRows.length;i++) {
    var r=allRows[i];
    if (!waveMap[r.waveNo]) waveMap[r.waveNo]={orders:new Set(),totalQty:0,rows:[]};
    waveMap[r.waveNo].orders.add(r.orderNo);
    waveMap[r.waveNo].totalQty+=r.qty;
    waveMap[r.waveNo].rows.push(r);
  }
}

// ── Render Wave ──
function renderWave(waveNo) {
  var wm=waveMap[waveNo]; if(!wm) return;
  var orders=Object.keys(
    wm.rows.reduce(function(m,r){ if(!m[r.orderNo]) m[r.orderNo]=[]; m[r.orderNo].push(r); return m; },{})
  ).sort();
  var maxSkus=0;
  var orderMap={};
  for (var i=0;i<wm.rows.length;i++) {
    var r=wm.rows[i];
    if(!orderMap[r.orderNo]) orderMap[r.orderNo]=[];
    orderMap[r.orderNo].push({sku:r.sku,qty:r.qty,productType:r.productType});
    if(orderMap[r.orderNo].length>maxSkus) maxSkus=orderMap[r.orderNo].length;
  }
  // Sort SKUs within each order: Accessories first
  for (var on in orderMap) {
    orderMap[on].sort(function(a,b){ if(a.productType==='Accessories'&&b.productType!=='Accessories') return -1; if(b.productType==='Accessories'&&a.productType!=='Accessories') return 1; return 0; });
  }
  // Sort orders by SKU similarity
  orders=orders.sort(function(a,b){ return orderMap[a].map(function(s){return s.sku;}).join(',').localeCompare(orderMap[b].map(function(s){return s.sku;}).join(',')); });

  var allPrinted=orders.every(function(on){return printedSet[on];});
  document.getElementById('summary-row').innerHTML=
    '<div class="col-md-3"><div class="card stat-card p-3 text-center"><div class="text-muted small">波次号</div><div class="fw-bold fs-5">'+waveNo+(allPrinted?' ✅':'')+'</div></div></div>'+
    '<div class="col-md-3"><div class="card stat-card p-3 text-center"><div class="text-muted small">订单数</div><div class="fw-bold fs-5">'+orders.length+'</div></div></div>'+
    '<div class="col-md-3"><div class="card stat-card p-3 text-center"><div class="text-muted small">总件数</div><div class="fw-bold fs-5">'+wm.totalQty+'</div></div></div>'+
    '<div class="col-md-3"><div class="card stat-card p-3 text-center"><div class="text-muted small">SKU列数</div><div class="fw-bold fs-5">'+maxSkus+'</div></div></div>';

  function typeBadge(pt) {
    var c=pt==='Accessories'?'#b45309':pt==='Standard'?'#1d4ed8':'#7c3aed';
    var bg=pt==='Accessories'?'#fef3c7':pt==='Standard'?'#dbeafe':'#f3e8ff';
    return '<span style="display:inline-block;background:'+bg+';color:'+c+';padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;">'+pt+'</span>';
  }

  var html='<div class="table-responsive"><table class="table table-sm align-middle"><thead><tr><th style="min-width:150px;">订单号</th><th style="width:90px;">面单</th>';
  for (var i=1;i<=maxSkus;i++) html+='<th>SKU'+i+'</th>';
  html+='</tr></thead><tbody>';

  for (var oi=0;oi<orders.length;oi++) {
    var on=orders[oi], skus=orderMap[on];
    var rowData=wm.rows.find(function(r){return r.orderNo===on;});
    var sheetUrl=(rowData&&rowData.sheetUrl)||'';
    var hasLabel=!!labelCache[on]||!!sheetUrl;
    var isPrinted=!!printedSet[on];
    var btnStyle=isPrinted?'btn-success':'btn-outline-primary';
    var btnText=isPrinted?'✅':'🖨️';
    html+='<tr><td><span class="order-no">'+on+'</span><span class="copy-icon" onclick="event.stopPropagation();copyOrderNo(\''+on+'\')" title="复制">📋</span></td>'+
      '<td><button class="btn btn-sm '+btnStyle+'" onclick="printLabel(\''+on+'\')" '+(hasLabel?'':'disabled')+'>'+btnText+'</button></td>';
    for (var si=0;si<maxSkus;si++) {
      if (si<skus.length) {
        var s=skus[si], imgSrc=imageCache[s.sku]||'https://api.swaner.vip/image/'+s.sku+'.png';
        html+='<td><div class="sku-cell text-center">'+
          '<div class="small fw-semibold">'+s.sku+'</div>'+
          '<img src="'+imgSrc+'" onerror="this.style.display=\'none\'" onclick="event.stopPropagation();openLightbox(\''+imgSrc+'\')">'+
          '<div class="mt-1">× '+s.qty+'</div>'+typeBadge(s.productType)+'</div></td>';
      } else { html+='<td></td>'; }
    }
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  html+='<div class="small text-muted mt-2">🟡 配件 &nbsp; 🔵 普品 &nbsp; 🟣 定制品</div>';
  document.getElementById('content-area').innerHTML=html;
}

// ── Label Print ──
function printLabel(orderNo) {
  var row=allRows.find(function(r){return r.orderNo===orderNo&&r.sheetUrl;});
  if (row&&row.sheetUrl) {
    var w=window.open(row.sheetUrl,'_blank');
    if(w){ printedSet[orderNo]=true; savePrinted(); syncOrderStatus(orderNo,"reviewed"); if(currentWave) renderWave(currentWave); }
    return;
  }
  var dataUrl=labelCache[orderNo];
  if(!dataUrl){ alert('未找到面单'); return; }
  var w=window.open('','_blank','width=900,height=700');
  if(!w){ alert('请允许弹出窗口'); return; }
  w.document.body.innerHTML='<embed src="'+dataUrl+'" type="application/pdf" style="width:100vw;height:100vh;border:none;">';
  printedSet[orderNo]=true; savePrinted(); syncOrderStatus(orderNo,"reviewed"); if(currentWave) renderWave(currentWave);
}

// ── Image Loading ──
function loadImages(input) {
  var files=Array.from(input.files);
  for (var i=0;i<files.length;i++) {
    var f=files[i], name=f.name.replace(/\.[^.]+$/,'');
    imageCache[name]=URL.createObjectURL(f);
  }
  document.getElementById('import-status').textContent='🖼️ 已加载 '+files.length+' 张图片';
  if(currentWave) renderWave(currentWave);
  input.value='';
}

// ── Barcode Scanner ──
function toggleScanner() {
  var area=document.getElementById('scan-area');
  if (area.style.display==='none') {
    area.style.display='block'; startScanner();
  } else { area.style.display='none'; stopScanner(); }
}
function startScanner() {
  if (typeof Html5Qrcode==='undefined'){ alert('扫码库加载失败'); return; }
  scanner=new Html5Qrcode('reader');
  scanner.start({facingMode:'environment'},{fps:10,qrbox:250},
    function(txt){ document.getElementById('wave-input').value=txt; stopScanner(); document.getElementById('scan-area').style.display='none'; searchWave(); },
    function(){}
  ).catch(function(e){ console.log('Scanner:',e); });
}
function stopScanner() {
  if(scanner){ scanner.stop().catch(function(){}); scanner=null; }
  document.getElementById('scan-area').style.display='none';
}

// ── Utility ──
function syncOrderStatus(orderNo,cs){ fetch("/api/v1/orders/delivery/update-status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({order_no:orderNo,custom_status:cs})}).catch(function(){}); }
function copyOrderNo(on) {
  navigator.clipboard.writeText(on);
  var t=document.getElementById('copy-toast'); t.textContent='已复制: '+on; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1200);
}
function openLightbox(src) {
  document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
function resetPrinted() { printedSet={}; savePrinted(); if(currentWave){ var wm=waveMap[currentWave]; if(wm) wm.rows.forEach(function(r){syncOrderStatus(r.orderNo,"printed");}); renderWave(currentWave); } }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeLightbox(); });
</script>
{% endblock %}
