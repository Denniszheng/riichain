<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RiiChain v2.0{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #c41e3a;
            --primary-dark: #a01830;
            --bg: #f8f9fa;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        body { background: var(--bg); font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; }
        .navbar-brand { font-weight: 700; color: var(--primary) !important; font-size: 1.3rem; }
        .nav-link.active { background: var(--primary) !important; color: #fff !important; border-radius: 8px; }
        .nav-link { color: #333; font-weight: 500; border-radius: 8px; margin: 2px 0; }
        .nav-link:hover { background: #ffeef2; color: var(--primary); }
        .stat-card { border: none; border-radius: 16px; box-shadow: var(--card-shadow); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .sidebar { min-height: 100vh; background: #fff; border-right: 1px solid #eee; padding: 16px 12px; }
        .main-content { padding: 32px; }
        .module-icon { font-size: 1.5rem; margin-right: 8px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm px-4">
        <a class="navbar-brand" href="/">🀄 RiiChain <span class="badge bg-secondary" style="font-size:0.7rem;">v2.0</span></a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-muted" style="font-size:0.85rem;">POD 全链路系统</span>
            <a href="/api/docs" class="btn btn-sm btn-outline-primary" target="_blank">API 文档</a>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-auto sidebar d-none d-lg-block" style="width:220px;">
                <div class="nav flex-column nav-pills">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                        <i class="bi bi-house-door module-icon"></i> 首页
                    </a>
                    <a class="nav-link {% if '/designs' in request.path %}active{% endif %}" href="/designs">
                        <i class="bi bi-palette module-icon"></i> Design Hub
                    </a>
                    <a class="nav-link {% if '/products' in request.path %}active{% endif %}" href="/products">
                        <i class="bi bi-box module-icon"></i> 基底产品
                    </a>
                    <a class="nav-link {% if '/listing' in request.path %}active{% endif %}" href="/listing">
                        <i class="bi bi-rocket-takeoff module-icon"></i> 一键铺货
                    </a>
                    <a class="nav-link {% if '/orders' in request.path %}active{% endif %}" href="/orders">
                        <i class="bi bi-cart module-icon"></i> 订单管理
                    </a>
                    <a class="nav-link {% if '/layout' in request.path %}active{% endif %}" href="/layout">
                        <i class="bi bi-grid-3x3 module-icon"></i> 一键排版
                    </a>
                    <a class="nav-link {% if '/wave' in request.path %}active{% endif %}" href="/wave">
                        <i class="bi bi-layer-stack module-icon"></i> 波次履约
                    </a>
                    <a class="nav-link {% if '/analytics' in request.path %}active{% endif %}" href="/analytics">
                        <i class="bi bi-graph-up module-icon"></i> 销售分析
                    </a>
                    <a class="nav-link {% if '/facilities' in request.path %}active{% endif %}" href="/facilities">
                        <i class="bi bi-building module-icon"></i> 印刷厂
                    </a>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="col main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        // 全局 Axios 实例
        const api = axios.create({ baseURL: '/api/v1', timeout: 15000 });
        api.interceptors.response.use(
            r => r,
            err => { alert(err.response?.data?.detail || err.message); return Promise.reject(err); }
        );
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
